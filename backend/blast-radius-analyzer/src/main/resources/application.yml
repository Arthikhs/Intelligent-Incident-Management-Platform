server:
  port: 8087

spring:
  application:
    name: blast-radius-analyzer
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/iimp_blast
    username: ${DB_USER:iimp}
    password: ${DB_PASS:iimp_secret}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: blast-radius-group
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
