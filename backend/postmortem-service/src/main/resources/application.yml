server:
  port: 8097

spring:
  application:
    name: postmortem-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/iimp_postmortem
    username: ${DB_USER:iimp}
    password: ${DB_PASS:iimp_secret}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: postmortem-group
      auto-offset-reset: earliest
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
