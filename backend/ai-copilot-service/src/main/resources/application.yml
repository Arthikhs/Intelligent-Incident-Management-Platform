server:
  port: 8098

spring:
  application:
    name: ai-copilot-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/iimp_copilot
    username: ${DB_USER:iimp}
    password: ${DB_PASS:iimp_secret}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.4

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
