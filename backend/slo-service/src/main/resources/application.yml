server:
  port: 8096

spring:
  application:
    name: slo-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/iimp_slo
    username: ${DB_USER:iimp}
    password: ${DB_PASS:iimp_secret}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: slo-group
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
