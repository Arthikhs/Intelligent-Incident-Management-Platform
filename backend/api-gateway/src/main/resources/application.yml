server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8090
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

        - id: incident-management
          uri: http://${INCIDENT_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/incidents/**
          filters:
            - JwtAuthFilter

        - id: ai-rca
          uri: http://${RCA_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/rca/**
          filters:
            - JwtAuthFilter

        - id: service-health
          uri: http://${HEALTH_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/health/**
          filters:
            - JwtAuthFilter

        - id: deployments
          uri: http://${DEPLOYMENT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/deployments/**
          filters:
            - JwtAuthFilter

        - id: alerts
          uri: http://${INCIDENT_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/alerts/**
          filters:
            - JwtAuthFilter

        - id: anomaly-detection
          uri: http://${ANOMALY_SERVICE_HOST:localhost}:8088
          predicates:
            - Path=/api/v1/anomalies/**
          filters:
            - JwtAuthFilter

        - id: blast-radius
          uri: http://${BLAST_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/v1/blast-radius/**
          filters:
            - JwtAuthFilter

        - id: notifications
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8094
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtAuthFilter

        - id: slo
          uri: http://${SLO_SERVICE_HOST:localhost}:8096
          predicates:
            - Path=/api/v1/slos/**
          filters:
            - JwtAuthFilter

        - id: postmortem
          uri: http://${POSTMORTEM_SERVICE_HOST:localhost}:8097
          predicates:
            - Path=/api/v1/postmortems/**
          filters:
            - JwtAuthFilter

        - id: knowledge-base
          uri: http://${KB_SERVICE_HOST:localhost}:8095
          predicates:
            - Path=/api/v1/kb/**
          filters:
            - JwtAuthFilter

        - id: ai-copilot
          uri: http://${COPILOT_SERVICE_HOST:localhost}:8098
          predicates:
            - Path=/api/v1/copilot/**
          filters:
            - JwtAuthFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

iimp:
  security:
    jwt:
      secret: ${JWT_SECRET:iimp-very-long-secret-key-minimum-256-bits-required-here-please-change}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
