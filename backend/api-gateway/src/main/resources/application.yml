server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8090
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

        - id: incident-management
          uri: http://${INCIDENT_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/incidents/**
          filters:
            - JwtAuthFilter

        - id: ai-rca
          uri: http://${RCA_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/rca/**
          filters:
            - JwtAuthFilter

        - id: service-health
          uri: http://${HEALTH_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/health/**
          filters:
            - JwtAuthFilter

        - id: deployments
          uri: http://${DEPLOYMENT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/deployments/**
          filters:
            - JwtAuthFilter

        - id: alerts
          uri: http://${INCIDENT_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/alerts/**
          filters:
            - JwtAuthFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

iimp:
  security:
    jwt:
      secret: ${JWT_SECRET:iimp-very-long-secret-key-minimum-256-bits-required-here-please-change}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
