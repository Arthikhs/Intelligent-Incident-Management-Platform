global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: iimp-local
    env: development

scrape_configs:
  - job_name: 'incident-management-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['incident-management-service:8081']

  - job_name: 'ai-rca-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-rca-service:8086']

  - job_name: 'log-analyzer-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['log-analyzer-service:8082']

  - job_name: 'alert-correlation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['alert-correlation-service:8085']

  - job_name: 'service-health-analyzer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['service-health-analyzer:8084']

  - job_name: 'deployment-tracker-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['deployment-tracker-service:8083']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
